name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest -v --cov=cloudcraft_mcp --cov-report=term-missing --cov-report=xml

      # Upload coverage from a single matrix cell so Codecov isn't hit four
      # times with identical reports. Python 3.12 is the canonical uploader.
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-cloudcraft-mcp
          fail_ci_if_error: true
          # Public repo — OIDC-based tokenless upload. If the repo is later
          # made private, add CODECOV_TOKEN as a repo secret and pass it here.
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
