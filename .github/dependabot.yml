version: 2

updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 10
    groups:
      python-runtime:
        dependency-type: production
      python-development:
        dependency-type: development

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:15"
      timezone: Asia/Seoul
    open-pull-requests-limit: 10
    groups:
      npm-development:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: Asia/Seoul
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:45"
      timezone: Asia/Seoul
