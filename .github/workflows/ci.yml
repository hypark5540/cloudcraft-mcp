name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.29"
          enable-cache: true
      - run: uv python install "$UV_PYTHON"
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check src tests
      - run: uv run mypy src
      - run: uv run pytest -v

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.29"
          enable-cache: true
      - run: uv python install "$UV_PYTHON"
      - run: uv sync --frozen --extra dev
      - name: Test with coverage
        run: |
          uv run pytest -v \
            --cov=cloudcraft_mcp \
            --cov-report=term-missing \
            --cov-report=xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: error
          retention-days: 7

  coverage-upload:
    name: Upload coverage
    needs: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Authenticate this upload-only job through GitHub OIDC.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
          path: .
      - name: Upload Python 3.12 coverage to Codecov
        if: >-
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: ./coverage.xml
          disable_search: true
          fail_ci_if_error: true

  distribution:
    name: Installed artifacts and security
    needs: [python, coverage-upload]
    runs-on: ubuntu-latest
    env:
      SOURCE_DATE_EPOCH: "946684800"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          cache: npm
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.29"
          enable-cache: true
      - run: npm run deps:locked
      - name: Audit npm dependency tree and signatures
        run: |
          npm audit --audit-level=moderate
          npm audit signatures
      - name: Audit locked Python runtime
        run: |
          uv export --locked --no-dev --no-hashes --no-emit-project \
            --output-file "$RUNNER_TEMP/runtime-requirements.txt"
          uvx --from pip-audit==2.10.1 pip-audit \
            --requirement "$RUNNER_TEMP/runtime-requirements.txt" \
            --progress-spinner off
          uv export --locked --extra dev --no-hashes --no-emit-project \
            --output-file "$RUNNER_TEMP/dev-requirements.txt"
          uvx --from pip-audit==2.10.1 pip-audit \
            --requirement "$RUNNER_TEMP/dev-requirements.txt" \
            --progress-spinner off
      - name: Static security checks
        run: |
          uvx --from bandit==1.9.4 bandit -q -r src
          uvx --from zizmor==1.28.0 zizmor --pedantic .github/workflows
      - run: npm run check
      - name: Build Python and npm packages
        run: |
          mkdir -p dist "$RUNNER_TEMP/npm-package"
          uv build --wheel --sdist --no-sources --out-dir dist
          uvx --from twine==6.2.0 twine check dist/*
          npm pack --pack-destination "$RUNNER_TEMP/npm-package"
      - name: Validate MCP Registry metadata
        run: >-
          uvx --from check-jsonschema==0.37.4 check-jsonschema
          --schemafile
          https://static.modelcontextprotocol.io/schemas/2025-12-11/server.schema.json
          server.json
      - name: Verify one wheel across PyPI and npm
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          PYPI_WHEEL="dist/cloudcraft_mcp-$VERSION-py3-none-any.whl"
          test -f "$PYPI_WHEEL"
          shopt -s nullglob
          TARBALLS=("$RUNNER_TEMP"/npm-package/*.tgz)
          test "${#TARBALLS[@]}" -eq 1
          tar -xOzf "${TARBALLS[0]}" \
            "package/npm/vendor/cloudcraft_mcp-$VERSION-py3-none-any.whl" \
            > "$RUNNER_TEMP/npm-wheel.whl"
          cmp "$PYPI_WHEEL" "$RUNNER_TEMP/npm-wheel.whl"
      - name: Smoke-test installed npm package
        run: | # zizmor: ignore[adhoc-packages] Installs only the local validated tarball.
          mkdir -p "$RUNNER_TEMP/npm-smoke"
          npm install --ignore-scripts --prefix "$RUNNER_TEMP/npm-smoke" "$RUNNER_TEMP"/npm-package/*.tgz
          node scripts/smoke-stdio.mjs "$RUNNER_TEMP/npm-smoke/node_modules/.bin/cloudcraft-mcp"
      - name: Smoke-test installed Python wheel
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          WHEEL="$GITHUB_WORKSPACE/dist/cloudcraft_mcp-$VERSION-py3-none-any.whl"
          uv venv "$RUNNER_TEMP/python-smoke"
          uv pip install --python "$RUNNER_TEMP/python-smoke/bin/python" "$WHEEL"
          node scripts/smoke-stdio.mjs "$RUNNER_TEMP/python-smoke/bin/cloudcraft-mcp"
          test "$(uvx --from "$WHEEL" cloudcraft-mcp --version)" = "cloudcraft-mcp $VERSION"
          test "$(uvx --from pipx==1.16.2 pipx run --spec "$WHEEL" cloudcraft-mcp --version)" = "cloudcraft-mcp $VERSION"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-candidates
          path: |
            dist/*
            ${{ runner.temp }}/npm-package/*.tgz
            release-artifacts/mcpb/*.mcpb
          if-no-files-found: error
          retention-days: 30

  docker:
    name: Docker stdio
    needs: python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          package-manager-cache: false
      - name: Build image
        run: docker build --tag cloudcraft-mcp:ci .
      - name: Verify non-root runtime
        run: test "$(docker run --rm --entrypoint id cloudcraft-mcp:ci -u)" != 0
      - name: Smoke-test image
        run: >-
          node scripts/smoke-stdio.mjs
          docker run --rm -i
          -e CLOUDCRAFT_API_KEY=smoke-test-key
          cloudcraft-mcp:ci

  gate:
    name: CI pass
    if: always()
    needs: [python, coverage, coverage-upload, distribution, docker]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Fail if any required job did not pass
        if: >-
          needs.python.result != 'success' ||
          needs.coverage.result != 'success' ||
          needs['coverage-upload'].result != 'success' ||
          needs.distribution.result != 'success' ||
          needs.docker.result != 'success'
        run: exit 1
      - run: echo "All required CI jobs passed."
